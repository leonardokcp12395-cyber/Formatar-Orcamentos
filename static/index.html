<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .drop-zone {
            border: 2px dashed #4B5563;
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3B82F6;
            background-color: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-12 text-center">
        <h1 class="text-4xl font-bold mb-2">Planify</h1>
        <p class="text-gray-400">Arraste seu arquivo Excel para gerar o orçamento</p>
    </header>

    <div class="w-full max-w-2xl bg-gray-900 rounded-xl shadow-2xl p-8">
        <div id="dropZone" class="drop-zone rounded-lg flex flex-col items-center justify-center py-20 cursor-pointer">
            <svg class="w-16 h-16 text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="text-xl text-gray-300 font-semibold mb-2">Arraste e solte o arquivo .xlsx aqui</p>
            <p class="text-sm text-gray-500">ou clique para selecionar</p>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx">
        </div>

        <div id="statusMessage" class="hidden mt-6 p-4 rounded-lg text-center font-medium">
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusMessage = document.getElementById('statusMessage');

        // Handlers for drag and drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                uploadFile(this.files[0]);
            }
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;

            if (files.length > 0) {
                const file = files[0];
                if (file.name.endsWith('.xlsx')) {
                    uploadFile(file);
                } else {
                    showStatus('Por favor, envie apenas arquivos .xlsx.', 'error');
                }
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            showStatus('Enviando...', 'loading');

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    showStatus(`Sucesso! Arquivo processado: ${data.arquivo}`, 'success');
                } else {
                    showStatus('Erro ao enviar o arquivo.', 'error');
                }
            } catch (error) {
                showStatus('Erro de conexão.', 'error');
            }

            // Reset input so the same file can be uploaded again if needed
            fileInput.value = '';
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'mt-6 p-4 rounded-lg text-center font-medium block';

            if (type === 'success') {
                statusMessage.classList.add('bg-green-900', 'text-green-200');
            } else if (type === 'error') {
                statusMessage.classList.add('bg-red-900', 'text-red-200');
            } else if (type === 'loading') {
                statusMessage.classList.add('bg-blue-900', 'text-blue-200');
            }
        }
    </script>
</body>
</html>
